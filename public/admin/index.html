<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Krrish IT</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #020617; color: #fff; }
      .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
      aside { background: #0f172a; border-right: 1px solid rgba(148,163,184,.18); padding: 24px; position: sticky; top: 0; height: 100vh; }
      .logo { font-size: 1.35rem; font-weight: 900; margin-bottom: 24px; }
      .logo .k { color: #e63946; }
      .logo .it { color: #2563eb; }
      button, .btn { width: 100%; border: 1px solid rgba(148,163,184,.18); border-radius: 12px; padding: 11px 12px; margin-bottom: 10px; background: transparent; color: #cbd5e1; text-align: left; cursor: pointer; font: inherit; font-weight: 800; text-decoration: none; display: block; }
      button.active { background: rgba(6,182,212,.12); color: #67e8f9; border-color: rgba(6,182,212,.35); }
      main { padding: 28px; }
      h1 { margin: 0 0 18px; letter-spacing: -.04em; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
      .card, .item { border: 1px solid rgba(148,163,184,.18); background: rgba(15,23,42,.78); border-radius: 18px; padding: 18px; }
      .card small, .muted { color: #94a3b8; }
      .card strong { display: block; margin-top: 8px; font-size: 2rem; color: #67e8f9; }
      .section { display: none; }
      .section.active { display: block; }
      .list { display: grid; gap: 12px; }
      input, textarea { width: 100%; border: 1px solid rgba(148,163,184,.22); background: #020617; color: #fff; border-radius: 12px; padding: 11px 12px; font: inherit; outline: none; margin: 6px 0 10px; }
      textarea { min-height: 110px; resize: vertical; }
      .primary { background: linear-gradient(135deg, #06b6d4, #2563eb); color: #fff; text-align: center; border: 0; }
      .danger { color: #fca5a5; border-color: rgba(239,68,68,.3); }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
      .status { color: #67e8f9; font-weight: 800; min-height: 24px; }
      @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } aside { position: relative; height: auto; } .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <div class="logo"><span class="k">K</span>rrish<span class="it">.it</span></div>
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="messages">Messages</button>
        <button class="tab" data-tab="projects">Projects</button>
        <button class="tab" data-tab="blog">Blog</button>
        <button id="logout" class="danger">Logout</button>
        <a class="btn" href="/">View site</a>
      </aside>

      <main>
        <div class="topbar">
          <div>
            <h1>Admin Dashboard</h1>
            <div class="muted" id="user-line">Checking authentication...</div>
          </div>
          <div class="status" id="status"></div>
        </div>

        <section id="overview" class="section active">
          <div class="grid">
            <div class="card"><small>Projects</small><strong id="project-count">0</strong></div>
            <div class="card"><small>Blog Posts</small><strong id="blog-count">0</strong></div>
            <div class="card"><small>Messages</small><strong id="message-count">0</strong></div>
          </div>
        </section>

        <section id="messages" class="section">
          <h2>Messages</h2>
          <div class="list" id="messages-list"></div>
        </section>

        <section id="projects" class="section">
          <h2>Projects</h2>
          <form id="project-form" class="card">
            <input name="title_en" placeholder="Title English" required />
            <input name="title_ar" placeholder="Title Arabic" required />
            <textarea name="description_en" placeholder="Description English" required></textarea>
            <textarea name="description_ar" placeholder="Description Arabic" required></textarea>
            <input name="technologies" placeholder="Technologies comma-separated" />
            <input name="url" placeholder="Live URL" />
            <input name="github" placeholder="GitHub URL" />
            <button class="primary" type="submit">Add project</button>
          </form>
          <div class="list" id="projects-list"></div>
        </section>

        <section id="blog" class="section">
          <h2>Blog</h2>
          <form id="blog-form" class="card">
            <input name="title_en" placeholder="Title English" required />
            <input name="title_ar" placeholder="Title Arabic" required />
            <textarea name="content_en" placeholder="Content English" required></textarea>
            <textarea name="content_ar" placeholder="Content Arabic" required></textarea>
            <input name="tags" placeholder="Tags comma-separated" />
            <button class="primary" type="submit">Add blog post</button>
          </form>
          <div class="list" id="blog-list"></div>
        </section>
      </main>
    </div>

    <script>
      const state = { projects: [], blog: [], messages: [] };
      const statusEl = document.getElementById('status');
      const setStatus = (text) => { statusEl.textContent = text || ''; };

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          credentials: 'include',
          headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      async function requireAuth() {
        try {
          const data = await api('/api/auth/me', { method: 'GET', cache: 'no-store' });
          document.getElementById('user-line').textContent = data.user?.email || 'Authenticated';
          return true;
        } catch {
          window.location.href = '/admin/login/';
          return false;
        }
      }

      function renderCounts() {
        document.getElementById('project-count').textContent = state.projects.length;
        document.getElementById('blog-count').textContent = state.blog.length;
        document.getElementById('message-count').textContent = state.messages.length;
      }

      function renderMessages() {
        const el = document.getElementById('messages-list');
        el.innerHTML = state.messages.length ? '' : '<p class="muted">No messages yet.</p>';
        state.messages.forEach((msg) => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `<strong>${msg.name || ''}</strong><div class="muted">${msg.email || ''}</div><p>${msg.message || ''}</p><button class="danger">Delete</button>`;
          item.querySelector('button').onclick = async () => {
            await api('/api/messages', { method: 'DELETE', body: JSON.stringify({ _id: msg._id }) });
            await loadData();
          };
          el.appendChild(item);
        });
      }

      function renderProjects() {
        const el = document.getElementById('projects-list');
        el.innerHTML = state.projects.length ? '' : '<p class="muted">No projects yet.</p>';
        state.projects.forEach((project) => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `<strong>${project.title_en || ''}</strong><p class="muted">${project.description_en || ''}</p><button class="danger">Delete</button>`;
          item.querySelector('button').onclick = async () => {
            await api('/api/projects', { method: 'DELETE', body: JSON.stringify({ _id: project._id }) });
            await loadData();
          };
          el.appendChild(item);
        });
      }

      function renderBlog() {
        const el = document.getElementById('blog-list');
        el.innerHTML = state.blog.length ? '' : '<p class="muted">No blog posts yet.</p>';
        state.blog.forEach((post) => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `<strong>${post.title_en || ''}</strong><p class="muted">${post.excerpt_en || post.content_en || ''}</p><button class="danger">Delete</button>`;
          item.querySelector('button').onclick = async () => {
            await api('/api/blog', { method: 'DELETE', body: JSON.stringify({ _id: post._id }) });
            await loadData();
          };
          el.appendChild(item);
        });
      }

      async function loadData() {
        setStatus('Loading...');
        try {
          const [projects, messages, blog] = await Promise.all([
            api('/api/projects'),
            api('/api/messages'),
            api('/api/blog'),
          ]);
          state.projects = projects.data || [];
          state.messages = messages.data || [];
          state.blog = blog.data || [];
          renderCounts();
          renderMessages();
          renderProjects();
          renderBlog();
          setStatus('Ready');
        } catch (error) {
          setStatus(error.message || 'Failed to load data');
        }
      }

      document.querySelectorAll('.tab').forEach((button) => {
        button.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
          document.querySelectorAll('.section').forEach((s) => s.classList.remove('active'));
          button.classList.add('active');
          document.getElementById(button.dataset.tab).classList.add('active');
        });
      });

      document.getElementById('logout').onclick = async () => {
        await api('/api/auth/logout', { method: 'POST' }).catch(() => null);
        window.location.href = '/admin/login/';
      };

      document.getElementById('project-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const body = Object.fromEntries(new FormData(event.target).entries());
        body.technologies = String(body.technologies || '').split(',').map((v) => v.trim()).filter(Boolean);
        await api('/api/projects', { method: 'POST', body: JSON.stringify(body) });
        event.target.reset();
        await loadData();
      });

      document.getElementById('blog-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const body = Object.fromEntries(new FormData(event.target).entries());
        body.tags = String(body.tags || '').split(',').map((v) => v.trim()).filter(Boolean);
        body.published = true;
        await api('/api/blog', { method: 'POST', body: JSON.stringify(body) });
        event.target.reset();
        await loadData();
      });

      (async () => {
        if (await requireAuth()) await loadData();
      })();
    </script>
  </body>
</html>
